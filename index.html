<div class="app">
  <header>

      <div class="brand">
        <div class="disco-dot"></div>

      </div>
      <div class="subtitle" id="subtitle">Loading your bookings…</div>
    </div>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <div id="viewerBanner"></div>
  <div class="tabs" id="tabs"></div>

  <main>
    <div class="note-bar" id="noteBar"></div>

  </main>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ======================================================================
   CONFIG — paste your Apps Script Web App URL here after deploying it.
   ====================================================================== */
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbzh2cEQYp15uL3B7Ay7I4H5HDKNZFMhJRSZLoiXGUgiLKZOME416bGaEydb9begh7KN4Q/exec'
};

const STATUSES = [
  { id:'enquiry',            label:'Enquiry' },
  { id:'quoted',             label:'Quoted' },
  { id:'awaiting',           label:'Follow-up Sent' },
  { id:'no_response',        label:'No Response' },
  { id:'awaiting_response',  label:'Awaiting for Response' },
  { id:'confirmed',          label:'Confirmed' },
  { id:'staffed',            label:'Staffed' },
  { id:'completed',          label:'Completed' },
  { id:'cancelled',          label:'Cancelled' },
  { id:'archive',            label:'Archive' },
];
const CLOSED_STATUSES = ['completed', 'cancelled', 'archive'];
const FOLLOWUP_STATUSES = ['enquiry', 'quoted', 'awaiting'];
const SOURCES = ['Email', 'Form', 'Referral', 'Website', 'CrowdPleaser'];

const PALETTE = ['pink','teal','amber','indigo','coral','sky'];
const COLOR_HEX = {
  coral:'var(--coral)', pink:'var(--pink)', teal:'var(--teal)',
  indigo:'var(--indigo)', amber:'var(--amber)', sky:'var(--sky)'
};

const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;
const EDIT_KEY_STORAGE = 'discoEditKey';

const params = new URLSearchParams(window.location.search);
const isViewer = params.get('view') === '1';

function defaultState(){
  return {
    categories: [
      { id: uid(), name:'Kids Party', color:'pink',
        note:'Kids Party 1.5hrs up to 25 Kids\nPackage Price: $575 plus GST\nExtra Child: $8 plus GST\nDon\'t forget about the T&Cs :)' },
      { id: uid(), name:'Hens Party', color:'coral',
        note:'Hens Party 1.5hrs up to 11-15 Guests\nPackage Price: $640 plus GST\nExtra Guest: $35 plus GST\nDon\'t forget about the T&Cs :)' },
      { id: uid(), name:'School Holidays', color:'teal',
        note:'School Holidays 1.5hrs up to 40 Children\nStandard Package Price: $475 plus GST\nExtra Child: $8 plus GST\nPrices may vary for PVT SH bookings\nDon\'t forget about the T&Cs :)' },
    ],
    cards: []
  };
}

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

let state = null;
let activeCategoryId = null;
let draggedCardId = null;

/* ---------------- Storage (Google Sheet via Apps Script) ---------------- */

function getEditKey(){ return localStorage.getItem(EDIT_KEY_STORAGE) || ''; }
function setEditKey(k){ localStorage.setItem(EDIT_KEY_STORAGE, k); }

async function loadState(){
  try{
    const res = await fetch(CONFIG.API_URL);
    const data = await res.json();
    state = (data && data.categories && data.categories.length) ? data : defaultState();
  }catch(e){
    state = defaultState();
    showToast('Could not load from the sheet — showing defaults');
  }
  if(!state.cards) state.cards = [];
}

let saveTimeout = null;
function saveState(){
  if(isViewer) return;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const key = getEditKey();
    if(!key){ openEditKeyModal(() => saveState()); return; }
    try{
      const body = new URLSearchParams();
      body.set('key', key);
      body.set('data', JSON.stringify(state));
      const res = await fetch(CONFIG.API_URL, { method: 'POST', body });
      const result = await res.json();
      if(!result.ok){
        showToast('Save failed — check your edit key');
      }
    }catch(e){
      showToast('Could not save — check your connection');
    }
  }, 500);
}

function openEditKeyModal(onSaved){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal small">
        <h2>🔑 Enter your edit key</h2>
        <p class="confirm-text">This is the private key you set in the Apps Script backend (EDIT_KEY). It's saved on this device only, so you won't need to enter it again here.</p>
        <div class="field">
          <input id="f-editkey" type="password" placeholder="Your edit key">
        </div>
        <div class="modal-actions"><div></div><button class="btn-primary" id="saveKeyBtn">Save key</button></div>
      </div>
    </div>
  `;
  document.getElementById('saveKeyBtn').onclick = () => {
    const val = document.getElementById('f-editkey').value.trim();
    if(!val){ showToast('Enter your edit key'); return; }
    setEditKey(val);
    closeModal();
    if(onSaved) onSaved();
  };
  document.getElementById('overlay').addEventListener('click', (e) => { if(e.target.id === 'overlay') closeModal(); });
}

/* ---------------- Everything below is unchanged from the Claude version ---------------- */

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function nextColor(){
  const used = state.categories.map(c => c.color);
  const free = PALETTE.find(c => !used.includes(c));
  return free || PALETTE[state.categories.length % PALETTE.length];
}

function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

function parsePrice(str){
  if(!str) return 0;
  const match = String(str).replace(/,/g, '').match(/[\d.]+/);
  return match ? parseFloat(match[0]) : 0;
}

function extraTotal(card){
  const count = parseFloat(card.extraCount) || 0;
  const rate = parsePrice(card.extraRate);
  return count * rate;
}

function formatMoney(n){
  return '$' + n.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function noteDisplay(note){
  return (note || '').split('\n').map(s => s.trim()).filter(Boolean).join('  •  ');
}

function renderHeaderActions(){
  const el = document.getElementById('headerActions');
  if(isViewer){ el.innerHTML = ''; return; }
  const showAdd = activeCategoryId !== 'ALL';
  el.innerHTML = `
    <button class="btn-share" id="editKeyBtn" data-focusable>🔑 Edit key</button>
    <button class="btn-share" id="shareBtn" data-focusable>Copy view-only link</button>
    ${showAdd ? '<button class="add-booking-btn" id="addBookingBtn" data-focusable>+ Add booking</button>' : ''}
  `;
  if(showAdd) document.getElementById('addBookingBtn').addEventListener('click', () => openBookingModal(null));
  document.getElementById('shareBtn').addEventListener('click', copyViewLink);
  document.getElementById('editKeyBtn').addEventListener('click', () => openEditKeyModal());
}

function copyViewLink(){
  const url = new URL(window.location.href);
  url.searchParams.set('view', '1');
  const link = url.toString();
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(link).then(() => showToast('View-only link copied'), () => showToast(link));
  } else {
    showToast(link);
  }
}

function renderViewerBanner(){
  const el = document.getElementById('viewerBanner');
  el.innerHTML = '';
}

function isOverdue(card){
  if(!FOLLOWUP_STATUSES.includes(card.status)) return false;
  return daysLeftForFollowup(card) <= 0;
}

function daysLeftForFollowup(card){
  const elapsedMs = Date.now() - (card.updatedAt || 0);
  const elapsedDays = Math.floor(elapsedMs / (24 * 60 * 60 * 1000));
  return 7 - elapsedDays;
}

function followupIndicatorHtml(card){
  if(!FOLLOWUP_STATUSES.includes(card.status)) return '';
  if(isOverdue(card)) return '<div class="card-overdue-flag">⏱ Follow up — no update in 7+ days</div>';
  const daysLeft = daysLeftForFollowup(card);
  return `<div class="followup-countdown">⏳ ${daysLeft} day${daysLeft === 1 ? '' : 's'} left to follow up</div>`;
}

function render(){
  renderHeaderActions();
  renderTabs();
  renderNoteBar();
  renderBoard();
  if(activeCategoryId === 'ALL'){
    const todayISO = todayLocalISO();
    const count = state.cards.filter(c => c.eventDate && c.eventDate >= todayISO && c.status === 'confirmed').length;
    document.getElementById('subtitle').textContent = `All Confirmed Bookings · ${count} confirmed${isViewer ? ' · read only' : ''}`;
    return;
  }
  const cat = state.categories.find(c => c.id === activeCategoryId);
  const count = state.cards.filter(c => c.categoryId === activeCategoryId).length;
  document.getElementById('subtitle').textContent =
    `${cat ? cat.name : ''} · ${count} booking${count === 1 ? '' : 's'}${isViewer ? ' · read only' : ''}`;
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';

  const allTab = document.createElement('button');
  allTab.className = 'tab' + (activeCategoryId === 'ALL' ? ' active' : '');
  allTab.innerHTML = `All Confirmed Bookings`;
  allTab.addEventListener('click', () => { activeCategoryId = 'ALL'; render(); });
  tabs.appendChild(allTab);

  state.categories.forEach(cat => {
    const count = state.cards.filter(c => c.categoryId === cat.id).length;
    const el = document.createElement('button');
    el.className = 'tab' + (cat.id === activeCategoryId ? ' active' : '');
    el.innerHTML = `<span class="dot" style="background:${COLOR_HEX[cat.color]}"></span>
      ${escapeHtml(cat.name)} <span class="tab-count">${count}</span>
      ${!isViewer ? '<span class="tab-del" title="Delete category">✕</span>' : ''}`;
    el.addEventListener('click', () => { activeCategoryId = cat.id; render(); });
    if(!isViewer){
      const delEl = el.querySelector('.tab-del');
      delEl.addEventListener('click', (e) => { e.stopPropagation(); deleteCategory(cat.id); });
    }
    tabs.appendChild(el);
  });
  if(!isViewer){
    const addBtn = document.createElement('button');
    addBtn.className = 'add-tab';
    addBtn.textContent = '+';
    addBtn.title = 'Add category';
    addBtn.onclick = openAddCategoryModal;
    tabs.appendChild(addBtn);
  }
}

function deleteCategory(catId){
  if(state.categories.length <= 1){
    showToast("You need at least one category — can't delete the last one");
    return;
  }
  const cat = state.categories.find(c => c.id === catId);
  if(!cat) return;
  const count = state.cards.filter(c => c.categoryId === catId).length;
  const msg = count > 0
    ? `Delete "${cat.name}"? This will also permanently delete ${count} booking${count === 1 ? '' : 's'} in it.`
    : `Delete "${cat.name}"?`;
  openConfirmModal(msg, () => {
    state.categories = state.categories.filter(c => c.id !== catId);
    state.cards = state.cards.filter(c => c.categoryId !== catId);
    if(activeCategoryId === catId){ activeCategoryId = state.categories[0].id; }
    saveState();
    render();
  });
}

function renderAllBookingsView(){
  const board = document.getElementById('board');
  const todayISO = todayLocalISO();
  const upcoming = state.cards
    .filter(c => c.eventDate && c.eventDate >= todayISO && c.status === 'confirmed')
    .sort((a, b) => (a.eventDate > b.eventDate ? 1 : a.eventDate < b.eventDate ? -1 : 0));

  if(upcoming.length === 0){
    board.innerHTML = `<div class="empty-col" style="width:100%; max-width:400px;">No confirmed bookings yet</div>`;
    return;
  }

  const rows = upcoming.map(c => {
    const cat = state.categories.find(cc => cc.id === c.categoryId) || { name:'', color:'pink' };
    const statusObj = STATUSES.find(s => s.id === c.status);
    const timeRange = [c.eventTime, c.eventEndTime].filter(Boolean).join(' – ');
    const metaLine = [cat.name, formatDate(c.eventDate), timeRange].filter(Boolean).join(' · ');
    return `
      <div class="all-booking-row" data-id="${c.id}" style="border-left-color:${cardColor(c, cat)}">
        <div class="all-booking-main">
          <div class="card-client">${escapeHtml(c.client)}</div>
          <div class="card-line">${escapeHtml(metaLine)}</div>
          ${c.location ? `<div class="card-line">${escapeHtml(c.location)}</div>` : ''}
        </div>
        <span class="card-tag">${escapeHtml(statusObj ? statusObj.label : c.status)}</span>
      </div>
    `;
  }).join('');

  board.innerHTML = `<div class="all-bookings-list">${rows}</div>`;

  board.querySelectorAll('.all-booking-row').forEach(row => {
    row.addEventListener('click', () => {
      const card = state.cards.find(c => c.id === row.dataset.id);
      if(card) openBookingModal(card);
    });
  });
}

function renderBoard(){
  const board = document.getElementById('board');
  if(activeCategoryId === 'ALL'){
    renderAllBookingsView();
    return;
  }
  board.innerHTML = '';
  const cat = state.categories.find(c => c.id === activeCategoryId);
  if(!cat) return;

  STATUSES.forEach(status => {
    const col = document.createElement('div');
    col.className = 'column' + (CLOSED_STATUSES.includes(status.id) ? ' closed' : '');
    col.dataset.status = status.id;

    const cardsHere = state.cards.filter(c => c.categoryId === cat.id && c.status === status.id);

    col.innerHTML = `
      <div class="column-head">
        <span class="column-title">${status.label}</span>
        <span class="column-count">${cardsHere.length}</span>
      </div>
      <div class="card-list"></div>
    `;

    const list = col.querySelector('.card-list');
    if(cardsHere.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-col';
      empty.textContent = status.id === 'enquiry' ? 'New bookings land here' : 'Drop a booking here';
      list.appendChild(empty);
    }
    cardsHere.forEach(card => list.appendChild(renderCard(card, cat)));

    if(status.id === 'completed' && cardsHere.length > 0){
      const total = cardsHere.reduce((sum, c) => sum + parsePrice(c.price) + extraTotal(c), 0);
      const footer = document.createElement('div');
      footer.className = 'column-footer';
      footer.textContent = `Total: ${formatMoney(total)}`;
      col.appendChild(footer);
    }

    if(!isViewer){
      col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('drag-over'); });
      col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
      col.addEventListener('drop', (e) => {
        e.preventDefault();
        col.classList.remove('drag-over');
        if(draggedCardId){
          const c = state.cards.find(c => c.id === draggedCardId);
          if(c && c.status !== status.id){ c.status = status.id; c.updatedAt = Date.now(); saveState(); render(); }
        }
      });
    }

    board.appendChild(col);
  });
}

function invoiceBadgeHtml(card){
  const badges = [];
  if(card.diPaid) badges.push('<span class="card-tag tag-paid">DI paid</span>');
  else if(card.diSent) badges.push('<span class="card-tag tag-sent">DI sent</span>');
  if(card.fiPaid) badges.push('<span class="card-tag tag-paid">FI paid</span>');
  else if(card.fiSent) badges.push('<span class="card-tag tag-sent">FI sent</span>');
  return badges.length ? `<div class="card-tags">${badges.join('')}</div>` : '';
}

function checklistBadgeHtml(card){
  const badges = [];
  if(card.addedConnecteam) badges.push('<span class="card-tag tag-paid">Connecteam ✓</span>');
  if(card.addedMasterSheet) badges.push('<span class="card-tag tag-paid">Master Sheet ✓</span>');
  return badges.length ? `<div class="card-tags">${badges.join('')}</div>` : '';
}

function cardColor(card, cat){
  return COLOR_HEX[card.color || (cat ? cat.color : 'pink')];
}

function renderCard(card, cat){
  const el = document.createElement('div');
  el.className = 'card' + (isOverdue(card) ? ' overdue' : '');
  el.draggable = !isViewer;
  el.style.borderLeftColor = cardColor(card, cat);

  const timeRange = [card.eventTime, card.eventEndTime].filter(Boolean).join(' – ');
  const dateLine = [formatDate(card.eventDate), timeRange].filter(Boolean).join(' · ');
  const tags = [];
  if(card.pax) tags.push(`${card.pax} pax`);
  if(card.price) tags.push(card.price);
  if(card.source) tags.push(`via ${card.source}`);
  if(parseFloat(card.extraCount) > 0) tags.push(`+${card.extraCount} extra (${formatMoney(extraTotal(card))})`);

  el.innerHTML = `
    ${!isViewer ? '<button class="card-del" title="Delete booking">✕</button>' : ''}
    <div class="card-client">${escapeHtml(card.client)}</div>
    ${dateLine ? `<div class="card-line">${escapeHtml(dateLine)}</div>` : ''}
    ${card.location ? `<div class="card-line">${escapeHtml(card.location)}</div>` : ''}
    ${card.staff ? `<div class="card-line">Staff: ${escapeHtml(card.staff)}</div>` : ''}
    ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="card-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
    ${invoiceBadgeHtml(card)}
    ${checklistBadgeHtml(card)}
    ${followupIndicatorHtml(card)}
  `;

  if(!isViewer){
    el.addEventListener('dragstart', () => { draggedCardId = card.id; el.classList.add('dragging'); });
    el.addEventListener('dragend', () => { el.classList.remove('dragging'); draggedCardId = null; });
    el.querySelector('.card-del').addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      openConfirmModal(`Remove ${card.client} from the pipeline?`, () => {
        state.cards = state.cards.filter(c => c.id !== card.id);
        saveState(); render();
      });
    });
    el.addEventListener('click', (e) => {
      if(e.target.closest('.card-del')) return;
      openBookingModal(card);
    });
  } else {
    el.addEventListener('click', () => openBookingModal(card));
  }
  return el;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

  const root = document.getElementById('modalRoot');

    <div class="overlay" id="overlay">
      <div class="modal small">
        <h2>Are you sure?</h2>
        <p class="confirm-text">${escapeHtml(message)}</p>
        <div class="modal-actions"><div></div><div class="modal-actions-right">
          <button class="btn-ghost" id="confCancel">Cancel</button>
          <button class="btn-danger-solid" id="confYes">Delete</button>
        </div></div>
      </div>
    </div>
  `;
  document.getElementById('confCancel').onclick = closeModal;
  document.getElementById('overlay').addEventListener('click', (e) => { if(e.target.id === 'overlay') closeModal(); });
  document.getElementById('confYes').onclick = () => { closeModal(); onConfirm(); };
}

function sourceOptionsHtml(selected){
  const opts = [''].concat(SOURCES);
  return opts.map(o => `<option value="${o}" ${o === (selected || '') ? 'selected' : ''}>${o || '—'}</option>`).join('');
}

function colorPickerHtml(selected){
  return `<div class="color-picker" id="cardColorPicker">${PALETTE.map(c =>
    `<div class="swatch${c === selected ? ' selected' : ''}" data-color="${c}" style="background:${COLOR_HEX[c]}"></div>`
  ).join('')}</div>`;
}

function wireColorPicker(container, initial, onChange){
  let chosen = initial;
  container.querySelectorAll('.swatch').forEach(sw => {
    sw.onclick = () => {
      chosen = sw.dataset.color;
      container.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      onChange(chosen);
    };
  });
  return () => chosen;
}

            <label for="f-endtime">End time</label>

    } else {
      state.cards.push({
        id: uid(), categoryId: activeCategoryId, status: 'enquiry',
        updatedAt: Date.now(), ...data
      });
    }
    saveState();
    closeModal();
    render();
  };
  document.getElementById('f-client').focus();
}

    </div>
  `;
  const picker = document.getElementById('colorPicker');
  PALETTE.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (color === chosen ? ' selected' : '');
    sw.style.background = COLOR_HEX[color];
    sw.onclick = () => {
      chosen = color;
      picker.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    };
    picker.appendChild(sw);
  });
  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('overlay').addEventListener('click', (e) => { if(e.target.id === 'overlay') closeModal(); });
  document.getElementById('saveCatBtn').onclick = () => {
    const name = document.getElementById('f-catname').value.trim();
    if(!name){ showToast('Give the category a name'); return; }
    const note = document.getElementById('f-catnote').value.trim();
    const newCat = { id: uid(), name, color: chosen, note };
    state.categories.push(newCat);
    activeCategoryId = newCat.id;
    saveState();
    closeModal();
    render();
  };
  document.getElementById('f-catname').focus();
}

function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

function todayLocalISO(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function checkSessionsToday(){
  const todayISO = todayLocalISO();
  const sessions = state.cards.filter(c => c.eventDate === todayISO && c.status !== 'cancelled');
  if(sessions.length === 0) return;
  const root = document.getElementById('modalRoot');
  const rows = sessions.map(c => {
    const cat = state.categories.find(cc => cc.id === c.categoryId) || { name:'', color:'pink' };
    const time = [c.eventTime, c.eventEndTime].filter(Boolean).join(' – ');
    return `<div class="session-row">
      <span class="dot" style="background:${cardColor(c, cat)}"></span>
      <div>
        <div class="session-client">${escapeHtml(c.client)}</div>
        <div class="session-meta">${escapeHtml(cat.name)}${time ? ' · ' + escapeHtml(time) : ''}${c.location ? ' · ' + escapeHtml(c.location) : ''}</div>
      </div>
    </div>`;
  }).join('');
  root.innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h2>🎉 ${sessions.length} session${sessions.length === 1 ? '' : 's'} today!</h2>
        <div class="session-list">${rows}</div>
        <div class="modal-actions"><div></div><button class="btn-primary" id="gotItBtn">Got it</button></div>
      </div>
    </div>
  `;
  document.getElementById('gotItBtn').onclick = closeModal;
  document.getElementById('overlay').addEventListener('click', (e) => { if(e.target.id === 'overlay') closeModal(); });
}

async function init(){
  renderViewerBanner();
  await loadState();
  activeCategoryId = 'ALL';
  render();
  checkSessionsToday();
  if(!isViewer && !getEditKey()){
    openEditKeyModal();
  }
}

init();
</script>
</body>
</html>
